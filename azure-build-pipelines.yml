resources:
  repositories:
    - repository: pipeline-templates
      type: git
      name: Oil/pipeline-templates
      ref: refs/heads/fix/exact-wheel-coverage

extends:
  template: templates/python-packages-pipeline.yml@pipeline-templates
  parameters:
    packageName: 'commodutil'
    pythonVersion: '3.12'
    additionalPythonVersions:
      - '3.11'
    dependencyMode: project
    dependencyGroups:
      - test
    installOdbc: false
    createRefinitivConfig: false

pool: Self-Hosted-AWS

trigger:
  branches:
    include:
      - main
  tags:
    include:
      - "*"
